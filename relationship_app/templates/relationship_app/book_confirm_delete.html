<!DOCTYPE html>
<html>
<head>
    <title>Confirm Delete</title>
</head>
<body>
    <h1>Are you sure you want to delete this book?</h1>
    <p>{{ book.title }} by {{ book.author }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="/">Cancel</a>
    </form>
</body>
</html>
